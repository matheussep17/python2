name: Build and Release Igreja

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: igreja

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create build virtual environment
        shell: pwsh
        run: python -m venv .buildvenv

      - name: Download FFmpeg for packaging
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $zipPath = Join-Path $env:RUNNER_TEMP "ffmpeg-release-essentials.zip"
          $extractPath = Join-Path $env:RUNNER_TEMP "ffmpeg-extract"
          $targetDir = Join-Path (Get-Location) "vendor\ffmpeg\bin"

          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath

          if (Test-Path -LiteralPath $extractPath) {
            Remove-Item -LiteralPath $extractPath -Recurse -Force
          }

          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractPath -Force

          $ffmpegExe = Get-ChildItem -Path $extractPath -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          $ffprobeExe = Get-ChildItem -Path $extractPath -Recurse -Filter "ffprobe.exe" | Select-Object -First 1

          if (-not $ffmpegExe -or -not $ffprobeExe) {
            throw "Nao encontrei ffmpeg.exe e ffprobe.exe no pacote baixado."
          }

          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item -LiteralPath $ffmpegExe.FullName -Destination (Join-Path $targetDir "ffmpeg.exe") -Force
          Copy-Item -LiteralPath $ffprobeExe.FullName -Destination (Join-Path $targetDir "ffprobe.exe") -Force

      - name: Build executable
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".\dist\Igreja.exe")) {
            throw "Arquivo dist\Igreja.exe nao encontrado apos o build."
          }

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: igreja/dist/Igreja.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
