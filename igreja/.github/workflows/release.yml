name: Build and Release Igreja

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create build virtual environment
        shell: pwsh
        run: python -m venv .buildvenv

      - name: Build executable
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".\dist\Igreja.exe")) {
            throw "Arquivo dist\Igreja.exe nao encontrado apos o build."
          }

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Igreja.exe
          body: |
            Melhorias visuais em toda a interface.
            Ajustes nos modais e refinamentos gerais de usabilidade.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
