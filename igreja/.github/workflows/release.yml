name: Build and Release Igreja

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        shell: pwsh
        run: python -m pip install -r requirements-dev.txt

      - name: Compile Python sources
        shell: pwsh
        run: python -m compileall -q app licensing_server scripts tests

      - name: Run tests
        shell: pwsh
        run: python -m pytest -q

      - name: Create build virtual environment
        shell: pwsh
        run: python -m venv .buildvenv

      - name: Validate tag version
        shell: pwsh
        run: python .\scripts\validate_tag_version.py

      - name: Build executable
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build.ps1

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath ".\dist\Igreja.exe")) {
            throw "Arquivo dist\Igreja.exe nao encontrado apos o build."
          }

      - name: Generate release manifest and checksum
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Get-Item -LiteralPath ".\dist\Igreja.exe"
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $repo = $env:GITHUB_REPOSITORY
          $downloadUrl = "https://github.com/$repo/releases/latest/download/Igreja.exe"
          $manifestPath = Join-Path $PWD "dist\update-manifest.json"
          $checksumPath = Join-Path $PWD "dist\Igreja.sha256.txt"
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $exe.FullName).Hash.ToLower()
          $manifest = [ordered]@{
            version = $version
            url = $downloadUrl
            notes = @"
Reduz a tolerancia offline da licenca para 24 horas com revalidacao automatica.
Adiciona verificacao SHA-256 aos downloads executaveis.
Melhora testes, logs, persistencia e reprodutibilidade do build.
"@.Trim()
            size = $exe.Length
            digest = $hash
            mandatory = $false
          }

          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $manifestPath -Encoding UTF8
          "$hash  $($exe.Name)" | Set-Content -LiteralPath $checksumPath -Encoding UTF8

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Igreja.exe
            dist/update-manifest.json
            dist/Igreja.sha256.txt
          body: |
            Reduz a tolerancia offline da licenca para 24 horas com revalidacao automatica.
            Adiciona verificacao SHA-256 aos downloads executaveis.
            Melhora testes, logs, persistencia e reprodutibilidade do build.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
